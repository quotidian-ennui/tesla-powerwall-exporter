name: build
run-name: Build (${{ github.event.client_payload.detail.pull_request || 'push-to-main' }})
on:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - dependency-review-success

env:
  STATUS_CONTEXT: "Gradle Check"
  LABEL_PREFIX: "build_"

permissions: {}

jobs:
  gradle:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    name: Gradle Check
    permissions:
      contents: write
      pull-requests: write
      issues: write
      statuses: write
    steps:
      - name: step-security/harden-runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Build Pending
        uses: quotidian-ennui/actions-olio/commit-status-and-label@62c2311929dae0037513a7c06bab420d9d4353d3 # v1.2.1
        if: |
          github.event.client_payload.detail.pull_request != '' &&
          github.event.client_payload.base.sha != ''
        with:
          state: pending
          sha: ${{ github.event.client_payload.base.sha }}
          context: ${{ env.STATUS_CONTEXT }}
          label_prefix: ${{ env.LABEL_PREFIX }}
      - name: Checkout branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.client_payload.base.ref }}
          fetch-depth: 0
          persist-credentials: false
      - name: Setup java
        uses: quotidian-ennui/actions-olio/setup-java-gradle@62c2311929dae0037513a7c06bab420d9d4353d3 # v1.2.1
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Gradle
        id: gradle
        run: |
          ./gradlew -PdisableSpotlessJava=false check
      - name: Build Result
        if: |
          (success() || failure()) &&
          github.event.client_payload.detail.pull_request != '' &&
          github.event.client_payload.base.sha != ''
        uses: quotidian-ennui/actions-olio/commit-status-and-label@62c2311929dae0037513a7c06bab420d9d4353d3 # v1.2.1
        with:
          state: ${{ steps.gradle.outcome }}
          sha: ${{ github.event.client_payload.base.sha }}
          context: ${{ env.STATUS_CONTEXT }}
          label_prefix: ${{ env.LABEL_PREFIX }}

  dependabot_merge:
    timeout-minutes: 2
    runs-on: ubuntu-latest
    name: Dependabot Merge
    if: |
      github.event.client_payload.base.actor == 'dependabot[bot]' 
    needs:
      - gradle
    steps:
      - name: step-security/harden-runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: "Create Token"
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.WORKFLOW_UPDATE_CLIENT_ID }}
          private-key: ${{ secrets.WORKFLOW_UPDATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "${{ github.event.repository.name}}"
          permission-contents: write
          permission-pull-requests: write
          permission-workflows: write
      - name: Checkout branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.client_payload.base.ref }}
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false
      - name: Repository Action Merge
        id: action_merge
        uses: quotidian-ennui/actions-olio/dependabot-merge@62c2311929dae0037513a7c06bab420d9d4353d3 # v1.2.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          change_filter: ".github/workflows/**"
          merge_commentary: "Merge Workflow Actions"
      - name: Dependabot Merge
        id: merge_gradle_dependencies
        uses: quotidian-ennui/actions-olio/dependabot-merge@62c2311929dae0037513a7c06bab420d9d4353d3 # v1.2.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          change_filter: "**/*.gradle*,**/build.gradle.kts,**/gradle-wrapper.properties,gradle/*.versions.toml,**/versions.properties"
          automerge_level: "semver-patch"
          merge_commentary: "Merge Gradle Dependencies"
          filter_separator: ","
          merge_retry_wait_seconds: 120
