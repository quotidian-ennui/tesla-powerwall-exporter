name: build
run-name: Build (${{ github.event.client_payload.detail.pull_request || 'push-to-main' }})
on:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - dependency-review-success

env:
  STATUS_CONTEXT: "Gradle Check"
  LABEL_PREFIX: "build_"

permissions: {}

jobs:
  gradle:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    name: Gradle Check
    permissions:
      contents: write
      pull-requests: write
      issues: write
      statuses: write
    steps:
      - name: step-security/harden-runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            downloads.gradle.org:443
            github.com:443
            plugins-artifacts.gradle.org:443
            plugins.gradle.org:443
            release-assets.githubusercontent.com:443
            repo.maven.apache.org:443
            services.gradle.org:443
            registry.quarkus.io:443
      - name: Build Pending
        uses: quotidian-ennui/actions-olio/commit-status-and-label@528d118cf867515584403396edee8a564a23bc00 # v1.3.0
        if: |
          github.event.client_payload.detail.pull_request != '' &&
          github.event.client_payload.base.sha != ''
        with:
          state: pending
          sha: ${{ github.event.client_payload.base.sha }}
          context: ${{ env.STATUS_CONTEXT }}
          label_prefix: ${{ env.LABEL_PREFIX }}
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.client_payload.base.ref }}
          fetch-depth: 0
          persist-credentials: false
      - name: Setup java
        uses: quotidian-ennui/actions-olio/setup-java-gradle@20d61b495f9f57f9103dd8f052d5808370d5ce8b # v1.2.3
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Gradle
        id: gradle
        run: |
          ./gradlew -PdisableSpotlessJava=false check
      - name: Build Result
        if: |
          (success() || failure()) &&
          github.event.client_payload.detail.pull_request != '' &&
          github.event.client_payload.base.sha != ''
        uses: quotidian-ennui/actions-olio/commit-status-and-label@528d118cf867515584403396edee8a564a23bc00 # v1.3.0
        with:
          state: ${{ steps.gradle.outcome }}
          sha: ${{ github.event.client_payload.base.sha }}
          context: ${{ env.STATUS_CONTEXT }}
          label_prefix: ${{ env.LABEL_PREFIX }}

  dependabot_merge:
    timeout-minutes: 2
    runs-on: ubuntu-latest
    name: Dependabot Merge
    if: |
      github.event.client_payload.base.actor == 'dependabot[bot]'
    needs:
      - gradle
    steps:
      - name: step-security/harden-runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: "Create Token"
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.WORKFLOW_UPDATE_CLIENT_ID }}
          private-key: ${{ secrets.WORKFLOW_UPDATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "${{ github.event.repository.name}}"
          permission-contents: write
          permission-pull-requests: write
          permission-workflows: write
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.client_payload.base.ref }}
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false
      - name: Repository Action Merge
        id: action_merge
        uses: quotidian-ennui/actions-olio/dependabot-merge@20d61b495f9f57f9103dd8f052d5808370d5ce8b # v1.2.3
        with:
          token: ${{ steps.app-token.outputs.token }}
          change_filter: ".github/workflows/**"
          merge_commentary: "Merge Workflow Actions"
      - name: Dependabot Merge
        id: merge_gradle_dependencies
        uses: quotidian-ennui/actions-olio/dependabot-merge@20d61b495f9f57f9103dd8f052d5808370d5ce8b # v1.2.3
        with:
          token: ${{ steps.app-token.outputs.token }}
          change_filter: "**/*.gradle*,**/build.gradle.kts,**/gradle-wrapper.properties,gradle/*.versions.toml,**/versions.properties"
          automerge_level: "semver-patch"
          merge_commentary: "Merge Gradle Dependencies"
          filter_separator: ","
          merge_retry_wait_seconds: 120
