name: dependency-review
on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  dependency-review:
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: "Dependency Review"
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          comment-summary-in-pr: true
          vulnerability-check: true
          license-check: true
          fail-on-severity: moderate
          allow-dependencies-licenses: "pkg:githubactions/quotidian-ennui/actions-olio/pr-trigger, pkg:githubactions/quotidian-ennui/actions-olio/docker-image-builder"

  review-success:
    timeout-minutes: 1
    needs:
      - dependency-review
    permissions:
      contents: write
      pull-requests: read
      issues: read
    runs-on: ubuntu-latest
    name: Dispatch
    steps:
      - name: dispatch
        uses: quotidian-ennui/actions-olio/pr-trigger@448a2329caa783bbfe2ad58fc2123f7e05efae89 # v0.10.3
        with:
          event_type: dependency-review-success
