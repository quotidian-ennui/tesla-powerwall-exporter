name: push-trigger
run-name: Push Build Trigger
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  repo-dispatch:
    timeout-minutes: 2
    permissions:
      contents: write
      pull-requests: read
      issues: read
    runs-on: ubuntu-latest
    name: Dispatch
    steps:
      - name: dispatch
        uses: quotidian-ennui/actions-olio/pr-trigger@a23dce3e6ff1ea5b39cfefd23a604426be7868f1 # v1.1.4
        with:
          event_type: push-trigger
