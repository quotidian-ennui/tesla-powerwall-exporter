name: docker-image

on:
  workflow_call:
  workflow_dispatch:

permissions: {}

jobs:
  docker-build-matrix:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      matrix:
        docker_target: ["uber", "native"]
        include:
          - docker_target: uber
            docker_tag_suffix: ""
            docker_image_platforms: linux/amd64,linux/arm64/v8
            gradle_build_params: -Dquarkus.package.jar.enabled=true -Dquarkus.package.jar.type=uber-jar
            gradle_cache: enabled
            dependency_graph: generate-and-submit
            dockerfile: ./src/main/docker/Dockerfile.jvm-uber
          - docker_target: native
            docker_tag_suffix: -native
            docker_image_platforms: linux/amd64
            gradle_cache: disabled
            gradle_build_params: -Dquarkus.package.jar.enabled=false -Dquarkus.native.enabled=true -Dquarkus.native.container-build=true -Dquarkus.native.container-runtime=docker
            dependency_graph: disabled
            dockerfile: ./src/main/docker/Dockerfile.native-micro
    steps:
      - name: step-security/harden-runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup java
        uses: quotidian-ennui/actions-olio/setup-java-gradle@c3db1eb13d426f7cf52137cb1780fa85ca0bf415 # v1.2.2
        with:
          java-version: "21"
          distribution: "temurin"
          gradle-dependency-graph: ${{ matrix.dependency_graph }}
          writeable: ${{ matrix.gradle_cache == 'enabled' }}
      - name: Build
        id: build
        env:
          DEPENDENCY_GRAPH_INCLUDE_CONFIGURATIONS: runtimeClasspath
          BUILD_PROPERTIES: ${{ matrix.gradle_build_params }}
        run: |
          ./gradlew --no-daemon build $BUILD_PROPERTIES
      - name: docker-build-push
        uses: quotidian-ennui/actions-olio/docker-image-builder@c3db1eb13d426f7cf52137cb1780fa85ca0bf415 # v1.2.2
        with:
          registry_push: true
          dockerfile: ${{ matrix.dockerfile }}
          image_platforms: ${{ matrix.docker_image_platforms }}
          image_tag_suffix: ${{ matrix.docker_tag_suffix }}
          ghcr_image_name: ghcr.io/${{ github.repository }}
          ghcr_user: ${{ github.repository_owner }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}
          caching: local
