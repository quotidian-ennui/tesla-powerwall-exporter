name: docker-image

on:
  workflow_call:
  workflow_dispatch:

permissions: {}

jobs:
  docker-build-matrix:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      matrix:
        docker_target: ["uber", "native"]
        include:
          - docker_target: uber
            docker_tag_suffix: ""
            docker_image_platforms: linux/amd64,linux/arm64/v8
            gradle_build_params: -Dquarkus.package.jar.enabled=true -Dquarkus.package.jar.type=uber-jar
            gradle_cache: enabled
            dependency_graph: generate-and-submit
            dockerfile: ./src/main/docker/Dockerfile.jvm-uber
          - docker_target: native
            docker_tag_suffix: -native
            docker_image_platforms: linux/amd64
            gradle_cache: disabled
            gradle_build_params: -Dquarkus.package.jar.enabled=false -Dquarkus.native.enabled=true -Dquarkus.native.container-build=true -Dquarkus.native.container-runtime=docker
            dependency_graph: disabled
            dockerfile: ./src/main/docker/Dockerfile.native-micro
    steps:
      - name: step-security/harden-runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            auth.docker.io:443
            cdn01.quay.io:443
            downloads.gradle.org:443
            ghcr.io:443
            github.com:443
            plugins-artifacts.gradle.org:443
            plugins.gradle.org:443
            production.cloudflare.docker.com:443
            production.cloudfront.docker.com:443
            quay.io:443
            registry-1.docker.io:443
            release-assets.githubusercontent.com:443
            repo.maven.apache.org:443
            services.gradle.org:443
            registry.quarkus.io:443
            registry.access.redhat.com:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup java
        uses: quotidian-ennui/actions-olio/setup-java-gradle@20d61b495f9f57f9103dd8f052d5808370d5ce8b # v1.2.3
        with:
          java-version: "21"
          distribution: "temurin"
          gradle-dependency-graph: ${{ matrix.dependency_graph }}
          writeable: ${{ matrix.gradle_cache == 'enabled' }}
      - name: Build
        id: build
        env:
          DEPENDENCY_GRAPH_INCLUDE_CONFIGURATIONS: runtimeClasspath
          BUILD_PROPERTIES: ${{ matrix.gradle_build_params }}
        run: |
          ./gradlew --no-daemon build $BUILD_PROPERTIES
      - name: docker-build-push
        uses: quotidian-ennui/actions-olio/docker-image-builder@528d118cf867515584403396edee8a564a23bc00 # v1.3.0
        with:
          registry_push: true
          dockerfile: ${{ matrix.dockerfile }}
          image_platforms: ${{ matrix.docker_image_platforms }}
          image_tag_suffix: ${{ matrix.docker_tag_suffix }}
          ghcr_image_name: ghcr.io/${{ github.repository }}
          ghcr_user: ${{ github.repository_owner }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}
          caching: local
