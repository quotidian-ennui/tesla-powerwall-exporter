name: quarkus-update
on:
  workflow_dispatch: null
  schedule:
    - cron: "15 03 * * 2,4,6"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PR_GITHUB_USER: qe-repo-updater[bot] <152897211+qe-repo-updater[bot]@users.noreply.github.com>

permissions: {}

jobs:
  quarkus:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: step-security/harden-runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            downloads.gradle.org:443
            github.com:443
            plugins-artifacts.gradle.org:443
            plugins.gradle.org:443
            release-assets.githubusercontent.com:443
            repo.maven.apache.org:443
            services.gradle.org:443
            registry.quarkus.io:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.WORKFLOW_UPDATE_CLIENT_ID }}
          private-key: ${{ secrets.WORKFLOW_UPDATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "${{ github.event.repository.name}}"
          permission-contents: write
          permission-pull-requests: write

      - name: Setup java
        uses: quotidian-ennui/actions-olio/setup-java-gradle@528d118cf867515584403396edee8a564a23bc00 # v1.3.0
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Current Quarkus Version
        id: currentQuarkus
        run: |
          quarkusVersion=$(grep '^quarkusPlatformVersion=' gradle.properties | cut -d'=' -f2)
          echo "release=$quarkusVersion" | tee -a "$GITHUB_OUTPUT"

      - name: Run QuarkusUpdate
        id: quarkusUpdate
        run: |
          ./gradlew --no-daemon quarkusUpdate --rewrite

      - name: Updated Quarkus Version
        id: latestQuarkus
        run: |
          quarkusVersion=$(grep '^quarkusPlatformVersion=' gradle.properties | cut -d'=' -f2)
          echo "release=$quarkusVersion" | tee -a "$GITHUB_OUTPUT"

      - name: Diff Quarkus Versions
        id: semverDiff
        uses: quotidian-ennui/actions-olio/semver-diff@528d118cf867515584403396edee8a564a23bc00 # v1.3.0
        with:
          first: ${{ steps.currentQuarkus.outputs.release }}
          second: ${{ steps.latestQuarkus.outputs.release }}
          type-major: feat(quarkus)!
          type-minor: feat(quarkus)
          type-patch: deps(quarkus)

      - name: Build PR title
        id: pr_title
        env:
          QUARKUS_CURRENT: ${{ steps.currentQuarkus.outputs.release }}
          QUARKUS_LATEST: ${{ steps.latestQuarkus.outputs.release }}
          CONVENTIONAL_COMMIT: ${{ steps.semverDiff.outputs.commit-type }}
        run: |
          echo "msg=$CONVENTIONAL_COMMIT: bump quarkus from $QUARKUS_CURRENT to $QUARKUS_LATEST" | tee -a "$GITHUB_OUTPUT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          committer: ${{ env.PR_GITHUB_USER }}
          author: ${{ env.PR_GITHUB_USER }}
          commit-message: "${{ steps.pr_title.outputs.msg }}"
          branch: deps/quarkus-${{ hashFiles('**/gradle.properties') }}
          title: "${{ steps.pr_title.outputs.msg }}"
          labels: dependencies
          reviewers: ${{ github.repository_owner }}
          body: |
            Automated upgrade to Quarkus ${{ steps.latestQuarkus.outputs.release }}.

            [Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).
